# Deploy PELAGIA to GitHub Pages.
#
# Gated to MANUAL (workflow_dispatch) until launch (Phase 8): it does NOT run on
# push, so nothing is published while the repo is private. At launch, make the
# repo public, enable Pages (Settings -> Pages -> Source: GitHub Actions), and
# add `push: { branches: [main] }` to the triggers below for continuous deploy.
name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
